# ============================================================
# Can-My-PC-Host-This — QA Test Matrix
# ============================================================
# Each scenario exercises the /api/v1/analyze endpoint and
# validates that the engine's data analysis outputs are
# mathematically correct and logically consistent.
#
# Fields per scenario:
#   id            – unique slug used in the report
#   description   – one-line human label
#   host_hardware – mirrors HostHardware schema
#   selected_profile – one of the four profile keys (or "custom")
#   custom_profile_config – optional; only when selected_profile == "custom"
#   docker_compose – inline Docker Compose YAML (as a scalar block)
#   expect:
#     status      – expected AnalyzeResponse.status
#     min_services – minimum number of services in topology
#     max_final_ram_mb – upper bound on final_predicted_ram_mb (vs effective_free)
#     services    – per-service assertions (name, tier, replicas)
#     no_warnings – if true, warns list must be empty
#     has_warnings – list of substrings that must appear in at least one warning
#     mutations   – list of {service, variable} that MUST have been mutated
#     cgroups_injected – list of service names that must have cgroups_injected=true
# ============================================================

scenarios:

  # ----------------------------------------------------------
  # GROUP A: BASIC TIER CLASSIFICATION
  # ----------------------------------------------------------

  - id: A-01-postgres-only-silent
    description: "Single Postgres (database tier) on a low-RAM host with silent_running profile"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 1024
      cpu_cores: 2
      storage_type: SSD
    selected_profile: silent_running
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 50
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: db
          tier: database
          replicas: 1
      no_warnings: true

  - id: A-02-redis-cache-tier
    description: "Single Redis (cache tier) — verifies image lookup table"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        cache:
          image: redis:7-alpine
          environment:
            maxmemory: 256
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: cache
          tier: cache
          replicas: 1
      no_warnings: true

  - id: A-03-nginx-frontend-tier
    description: "Nginx frontend — verifies image lookup table maps to frontend tier"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: background_dev
    docker_compose: |
      services:
        proxy:
          image: nginx:stable-alpine
          ports:
            - "80:80"
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: proxy
          tier: frontend
          replicas: 1

  - id: A-04-hybrid-ports-classifier
    description: "Service with ports but no image match → backend_hybrid tier"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: api
          tier: backend_hybrid
          replicas: 1

  - id: A-05-worker-keyword-classifier
    description: "Service named with 'worker' keyword → backend_low_priority"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: background_dev
    docker_compose: |
      services:
        celery_worker:
          image: myapp:latest
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: celery_worker
          tier: backend_low_priority
          replicas: 1

  - id: A-06-explicit-tier-compiler-label
    description: "Service uses x-compile.tier label → explicit tier override"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: background_dev
    docker_compose: |
      services:
        mydb:
          image: busybox:latest
          labels:
            compiler.tier: "database"
          environment:
            max_connections: 20
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: mydb
          tier: database
          replicas: 1

  # ----------------------------------------------------------
  # GROUP B: RAM MATH VALIDATION
  # ----------------------------------------------------------

  - id: B-01-database-ram-formula
    description: "Validate database RAM formula: 128 + (max_connections * 15)"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        pg:
          image: postgres:14
          environment:
            max_connections: 100
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: pg
          tier: database
          replicas: 1
      # initial_ram = 128 + (100 * 15) = 1628 MB
      # Must be within free_ram * ram_safety_buffer = 4096 * 0.95 = 3891.2

  - id: B-02-backend-hybrid-ram-formula
    description: "Validate backend_hybrid RAM: 64 + (workers*32) + (web_concurrency*48)"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 8
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: gunicorn:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: api
          tier: backend_hybrid
          replicas: 1
      # initial_ram = 64 + (4*32) + (4*48) = 64+128+192 = 384 MB

  - id: B-03-cache-ram-formula
    description: "Validate cache RAM formula: 16 + maxmemory"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        redis:
          image: redis:7
          environment:
            maxmemory: 256
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: redis
          tier: cache
          replicas: 1
      # initial_ram = 16 + 256 = 272 MB

  - id: B-04-replicas-multiply-ram
    description: "3 replicas of backend_hybrid → RAM multiplied by replica count"
    host_hardware:
      total_ram_mb: 32768
      free_ram_mb: 16384
      cpu_cores: 16
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 2
            WEB_CONCURRENCY: 2
          deploy:
            replicas: 3
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: api
          tier: backend_hybrid
          replicas: 3
      # initial_ram per replica = 64 + (2*32) + (2*48) = 64+64+96 = 224
      # total = 224 * 3 = 672 MB

  # ----------------------------------------------------------
  # GROUP C: PROFILE MATH VALIDATION
  # ----------------------------------------------------------

  - id: C-01-silent-running-profile-math
    description: "silent_running: ram_safety_buffer=0.70, cpu_threshold_multiplier=0.80"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: silent_running
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 2
            WEB_CONCURRENCY: 2
    expect:
      status: FULLY_SOLVED
      min_services: 1
      # effective_free_ram = 4096 * 0.70 = 2867.2 MB
      # cpu_budget = 4 * 0.80 = 3.2 cores

  - id: C-02-max-performance-profile-math
    description: "max_performance: ram_safety_buffer=0.95, cpu_threshold_multiplier=1.50"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 2
            WEB_CONCURRENCY: 2
    expect:
      status: FULLY_SOLVED
      min_services: 1
      # effective_free_ram = 4096 * 0.95 = 3891.2 MB
      # cpu_budget = 4 * 1.50 = 6.0 cores

  - id: C-03-custom-profile-override
    description: "Custom profile with strict buffer=0.40 forces optimization on small host"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 2048
      cpu_cores: 4
      storage_type: SSD
    selected_profile: custom
    custom_profile_config:
      ram_safety_buffer: 0.40
      cpu_threshold_multiplier: 0.50
      max_iterations: 50
      allow_cgroups: true
      floor_strictness: 1.0
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
        db:
          image: postgres:15
          environment:
            max_connections: 100
        cache:
          image: redis:7
          environment:
            maxmemory: 256
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 3

  - id: C-04-custom-no-cgroups
    description: "Custom profile with allow_cgroups=false on an over-capacity host → UNSOLVABLE"
    host_hardware:
      total_ram_mb: 2048
      free_ram_mb: 512
      cpu_cores: 2
      storage_type: SSD
    selected_profile: custom
    custom_profile_config:
      ram_safety_buffer: 0.90
      cpu_threshold_multiplier: 0.90
      max_iterations: 50
      allow_cgroups: false
      floor_strictness: 1.0
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 200
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 8
            WEB_CONCURRENCY: 8
        cache:
          image: redis:7
          environment:
            maxmemory: 512
    expect:
      status: DEGRADED_SAFE
      min_services: 3

  # ----------------------------------------------------------
  # GROUP D: HDD STORAGE PENALTIES
  # ----------------------------------------------------------

  - id: D-01-hdd-database-25pct-cushion
    description: "HDD host with database tier → 25% RAM cushion applied, trace must mention it"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: HDD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 20
    expect:
      status: FULLY_SOLVED
      min_services: 1
      # DB base = 128 + (20*15) = 428 MB (>256), so HDD cushion applies
      # cushioned = 428 * 1.25 = 535 MB

  - id: D-02-hdd-max-connections-ceil
    description: "HDD host caps max_connections at 50 for DB RAM formula"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: HDD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 200
    expect:
      status: FULLY_SOLVED
      min_services: 1
      # HDD: max_connections capped at 50 for _service_ram calculation
      # base_ram = 128 + (50*15) = 878 MB (capped, not 128+200*15=3128)

  - id: D-03-hdd-maxmemory-ceil
    description: "HDD host caps maxmemory at 50 for cache RAM formula"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: HDD
    selected_profile: max_performance
    docker_compose: |
      services:
        redis:
          image: redis:7
          environment:
            maxmemory: 512
    expect:
      status: FULLY_SOLVED
      min_services: 1
      # HDD: maxmemory capped at 50 for RAM formula → 16+50=66 MB (not 16+512=528)

  - id: D-04-hdd-no-database-warning
    description: "HDD host with no database tier → warning emitted"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: HDD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 2
            WEB_CONCURRENCY: 2
    expect:
      status: FULLY_SOLVED
      min_services: 1
      has_warnings:
        - "HDD storage detected, but no database layer is running."

  # ----------------------------------------------------------
  # GROUP E: OPTIMIZATION / SCALING LOOP
  # ----------------------------------------------------------

  - id: E-01-workers-scaled-down-ram
    description: "Tiny RAM budget forces WORKERS reduction via optimization loop"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 1024
      cpu_cores: 2
      storage_type: SSD
    selected_profile: silent_running
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 8
            WEB_CONCURRENCY: 8
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 1

  - id: E-02-max-connections-scaled-down
    description: "Tight RAM budget forces max_connections reduction in DB"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 800
      cpu_cores: 2
      storage_type: SSD
    selected_profile: silent_running
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 100
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 1

  - id: E-03-maxmemory-scaled-down
    description: "Cache maxmemory reduced under tight RAM"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 500
      cpu_cores: 2
      storage_type: SSD
    selected_profile: silent_running
    docker_compose: |
      services:
        cache:
          image: redis:7
          environment:
            maxmemory: 512
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 1

  - id: E-04-multi-service-stack-full-solve
    description: "Full LAMP-style stack (db+cache+api+nginx) on generous host → FULLY_SOLVED"
    host_hardware:
      total_ram_mb: 32768
      free_ram_mb: 16384
      cpu_cores: 8
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 50
        cache:
          image: redis:7
          environment:
            maxmemory: 256
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
        nginx:
          image: nginx:stable-alpine
          ports:
            - "80:80"
    expect:
      status: FULLY_SOLVED
      min_services: 4
      services:
        - name: api
          tier: backend_hybrid
        - name: cache
          tier: cache
        - name: db
          tier: database
        - name: nginx
          tier: frontend
      no_warnings: true

  - id: E-05-cgroups-injected-on-overflow
    description: "Overflowing stack that can only fit via cgroup injection → DEGRADED_SAFE"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 800
      cpu_cores: 2
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 100
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
        cache:
          image: redis:7
          environment:
            maxmemory: 256
    expect:
      status_in: [DEGRADED_SAFE, UNSOLVABLE]
      min_services: 3

  # ----------------------------------------------------------
  # GROUP F: EDGE / BOUNDARY CASES
  # ----------------------------------------------------------

  - id: F-01-invalid-free-gt-total
    description: "free_ram_mb > total_ram_mb → INVALID_MANIFEST immediately"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp:latest
          ports:
            - "8000:80"
    expect:
      status: INVALID_MANIFEST

  - id: F-02-empty-yaml
    description: "Empty YAML string → INVALID_MANIFEST"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: ""
    expect:
      status: INVALID_MANIFEST

  - id: F-03-no-services-in-yaml
    description: "Valid YAML but no services block → INVALID_MANIFEST"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      version: "3.9"
      volumes:
        data: {}
    expect:
      status: INVALID_MANIFEST

  - id: F-04-unsolvable-floors-exceed-ram
    description: "Minimum floors exceed host RAM → UNSOLVABLE before optimization"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 100
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 100
        db2:
          image: mysql:8
          environment:
            max_connections: 100
    expect:
      status: UNSOLVABLE
      min_services: 2

  - id: F-05-port-conflict-warning
    description: "Two services binding same host port → warning emitted"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 8
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api1:
          image: myapp:latest
          ports:
            - "8080:8080"
        api2:
          image: myapp:latest
          ports:
            - "8080:80"
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE]
      min_services: 2
      has_warnings:
        - "8080"

  - id: F-06-64mb-narrow-margin-degraded
    description: "Technically fits but margin < 64 MB → DEGRADED_SAFE status"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 1024
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 60
        cache:
          image: redis:7
          environment:
            maxmemory: 256
    # effective_free = 1024 * 0.95 = 972.8 MB
    # db = 128 + (60*15) = 1028 MB > effective_free → optimizer/cgroups kick in
    # After optimization, if margin ends up < 64 → DEGRADED_SAFE
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 2

  - id: F-07-malformed-yaml
    description: "YAML with a syntax error → INVALID_MANIFEST"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 4096
      cpu_cores: 4
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        api:
          image: myapp
           ports:
            - "80:80"
    expect:
      status: INVALID_MANIFEST

  # ----------------------------------------------------------
  # GROUP G: X-TUNING EXTENSIONS
  # ----------------------------------------------------------

  - id: G-01-xtuning-ram-floor-override
    description: "x-tuning.ram_floor_mb overrides tier floor for at_floor calculation"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 8192
      cpu_cores: 4
      storage_type: SSD
    selected_profile: background_dev
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 20
          x-tuning:
            ram_floor_mb: 500
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: db
          tier: database
          replicas: 1

  - id: G-02-xtuning-never-cgroup-respected
    description: "x-tuning.never_cgroup=true → service excluded from memory cgroup limits"
    host_hardware:
      total_ram_mb: 4096
      free_ram_mb: 800
      cpu_cores: 2
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 50
          x-tuning:
            never_cgroup: true
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
    expect:
      status_in: [FULLY_SOLVED, DEGRADED_SAFE, UNSOLVABLE]
      min_services: 2

  # ----------------------------------------------------------
  # GROUP H: MULTI-REPLICA ADVANCED
  # ----------------------------------------------------------

  - id: H-01-multi-replica-db
    description: "3 DB replicas → floor = 128*3 = 384 MB minimum"
    host_hardware:
      total_ram_mb: 16384
      free_ram_mb: 4096
      cpu_cores: 8
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 20
          deploy:
            replicas: 3
    expect:
      status: FULLY_SOLVED
      min_services: 1
      services:
        - name: db
          tier: database
          replicas: 3

  - id: H-02-full-microservices-stack
    description: "Full microservices stack: Postgres + Redis + Traefik + API + Worker"
    host_hardware:
      total_ram_mb: 32768
      free_ram_mb: 24576
      cpu_cores: 8
      storage_type: SSD
    selected_profile: max_performance
    docker_compose: |
      services:
        db:
          image: postgres:15
          environment:
            max_connections: 50
        cache:
          image: redis:7
          environment:
            maxmemory: 256
        reverse_proxy:
          image: traefik:v2
          ports:
            - "80:80"
            - "443:443"
        api:
          image: myapp:latest
          ports:
            - "8000:8000"
          environment:
            WORKERS: 4
            WEB_CONCURRENCY: 4
        worker:
          image: myapp:latest
    expect:
      status: FULLY_SOLVED
      min_services: 5
      services:
        - name: api
          tier: backend_hybrid
        - name: cache
          tier: cache
        - name: db
          tier: database
        - name: reverse_proxy
          tier: frontend
        - name: worker
          tier: backend_low_priority

  - id: H-03-custom-floor-strictness
    description: "floor_strictness=0.5 allows more aggressive downscaling"
    host_hardware:
      total_ram_mb: 8192
      free_ram_mb: 1500
      cpu_cores: 4
      storage_type: SSD
    selected_profile: custom
    custom_profile_config:
      ram_safety_buffer: 0.90
      cpu_threshold_multiplier: 1.00
      max_iterations: 50
